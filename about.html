<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Cover Template</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            text-shadow: 0 .05rem .1rem rgba(0, 0, 0, .5);
            background-color: #212529;
        }

        .cover-container {
            max-width: 42em;
        }

        .nav-masthead .nav-link {
            color: rgba(255,255,255,.75);
            border-bottom: .25rem solid transparent;
        }

        .nav-masthead .nav-link:hover,
        .nav-masthead .nav-link:focus {
            border-bottom-color: #E7A727;
        }

        .nav-masthead .active {
            color: #fff;
            border-bottom-color: #E7A727;
        }

        .btn-secondary {
            color: #333;
        }

        .custom-header {
            background-color: #5C8E67;
            width: 100vw;
            margin-left: calc(50% - 50vw);
        }
        
        .custom-header h3 {
            padding-bottom: 10px;
        }

        .custom-header nav {
            margin-top: 10px;
        }
    </style>
</head>

<body class="d-flex h-100 text-center text-black bg-light">

<div class="cover-container d-flex w-100 h-100 pt-0 px-3 pb-3 mx-auto flex-column">

    <header class="mb-auto custom-header text-white pt-3">
        <div class="container d-flex justify-content-between align-items-center">
            <h3 class="float-md-start">Home</h3>

            <nav class="nav nav-masthead justify-content-center float-md-end px-5 pb-0 fs-5">
                <a class="nav-link" href="home.html">Home</a>
                <a class="nav-link active" href="about.html">About</a>
                <a class="nav-link" href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <footer class="mt-auto text-black-50">
        <p>
            Made for IT0043L by Mark Xavier Alayon from Far Eastern University 
        </p>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
