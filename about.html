<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Cover Template</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            color: #212529;
            text-shadow: none;
        }

        footer {
            color:#333;
        }

        body.light-mode {
            background-color: #121212;
            color: #f8f9fa;
        }

        body.light-mode footer {
            color: #adb5bd;
        }

        body.light-mode .custom-header {
            background-color: #3F6650;
        }

        body.light-mode .nav-masthead .nav-link {
            color: rgba(255,255,255,.75);
        }

        body.light-mode .nav-masthead .active {
            color: #ffffff;
        }

        body.light-mode .btn-dark {
            background-color: #343a40;
            border-color: #343a40;
        }

        .cover-container {
            max-width: 42em;
        }

        .nav-masthead .nav-link {
            color: rgba(255,255,255,.75);
            border-bottom: .25rem solid transparent;
        }

        .nav-masthead .nav-link:hover,
        .nav-masthead .nav-link:focus {
            border-bottom-color: #E7A727;
        }

        .nav-masthead .active {
            color: #fff;
            border-bottom-color: #E7A727;
        }

        .btn-secondary {
            color: #333;
        }

        .custom-header {
            background-color: #5C8E67;
            width: 100vw;
            margin-left: calc(50% - 50vw);
        }
        
        .custom-header h3 {
            padding-bottom: 10px;
        }

        .custom-header nav {
            margin-top: 10px;
        }
    </style>
</head>

<body class="d-flex h-100 text-center">

<div class="cover-container d-flex w-100 h-100 pt-0 px-3 pb-3 mx-auto flex-column">

    <header class="mb-auto custom-header text-white pt-3">
        <div class="container d-flex justify-content-between align-items-center">
    <h3>Home</h3>

    <div class="d-flex align-items-center">
        <nav class="nav nav-masthead me-3 fs-5">
            <a class="nav-link" href="home.html">Home</a>
            <a class="nav-link active" href="about.html">About</a>
            <a class="nav-link" href="contact.html">Contact</a>
        </nav>

        <button id="themeToggle" class="btn btn-outline-light">
            🌙 Dark
        </button>
    </div>
</div>
    </header>

    <footer class="mt-auto">
        <p>
            Made for IT0043L by Mark Xavier Alayon from Far Eastern University 
        </p>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/theme.js"></script>

</body>
</html>
