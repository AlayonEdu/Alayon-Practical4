<!DOCTYPE html>
<html lang="en" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Cover Template</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            text-shadow: 0 .05rem .1rem rgba(0, 0, 0, .5);
            box-shadow: inset 0 0 5rem rgba(0, 0, 0, .5);
            background-color: #212529;
        }

        .cover-container {
            max-width: 42em;
        }

        .nav-masthead .nav-link {
            color: rgba(255,255,255,.75);
            border-bottom: .25rem solid transparent;
        }

        .nav-masthead .nav-link:hover,
        .nav-masthead .nav-link:focus {
            border-bottom-color: rgba(255,255,255,.25);
        }

        .nav-masthead .active {
            color: #fff;
            border-bottom-color: #fff;
        }

        .btn-secondary {
            color: #333;
        }
    </style>
</head>

<body class="d-flex h-100 text-center text-white bg-dark">

<div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">

    <header class="mb-auto">
        <div>
            <h3 class="float-md-start mb-0">Cover</h3>

            <nav class="nav nav-masthead justify-content-center float-md-end">
                <a class="nav-link active" href="#">Home</a>
                <a class="nav-link" href="#">Features</a>
                <a class="nav-link" href="#">Contact</a>
            </nav>
        </div>
    </header>

    <main class="px-3">
        <h1>Cover your page.</h1>

        <p class="lead">
            Cover is a one-page template for building simple and beautiful home pages.
            Download, edit the text, and add your own fullscreen background photo to make it your own.
        </p>

        <p class="lead">
            <a href="#" class="btn btn-lg btn-light fw-bold">
                Learn More
            </a>
        </p>
    </main>

    <footer class="mt-auto text-white-50">
        <p>
            Cover template for
            <a href="https://getbootstrap.com/" class="text-white">Bootstrap</a>,
            by
            <a href="https://twitter.com/mdo" class="text-white">@mdo</a>.
        </p>
    </footer>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
